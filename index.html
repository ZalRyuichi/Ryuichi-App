<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Ryuichi - iOS</title>
<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:100%; height:100%; background:#0a0a0a; overflow:hidden; }

  #app-frame {
    position:fixed; inset:0;
    width:100%; height:100%;
    border:none; display:none;
    background:#0a0a0a;
  }

  #loading {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#0a0a0a; color:#999;
    font-family:-apple-system,system-ui,sans-serif; font-size:13px;
    flex-direction:column; gap:14px;
  }
  .spin {
    width:28px; height:28px; border-radius:50%;
    border:2px solid rgba(255,255,255,.15); border-top-color:#c0c0c0;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  #error-box {
    position:fixed; inset:0;
    display:none; align-items:center; justify-content:center;
    background:#0a0a0a; color:#ef4444;
    font-family:-apple-system,system-ui,sans-serif; font-size:13px;
    flex-direction:column; gap:10px; padding:20px; text-align:center;
  }
  #retry-btn {
    margin-top:6px; padding:8px 18px; border-radius:8px;
    border:1px solid rgba(239,68,68,.4); background:rgba(239,68,68,.1);
    color:#ef4444; font-size:12px; cursor:pointer;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div>Menghubungkan Ke Server...</div>
</div>

<div id="error-box">
  <div>Gagal Memuat Server.</div>
  <button id="retry-btn" onclick="init()">Coba Lagi</button>
</div>

<iframe id="app-frame" allow="camera;microphone;geolocation;clipboard-write"></iframe>

<script>
  const SOURCE_URL = 'https://raw.githubusercontent.com/ZalRyuichi/Ryuichi-App/main/ios_url.txt';

  const loadingEl = document.getElementById('loading');
  const errorEl   = document.getElementById('error-box');
  const frameEl   = document.getElementById('app-frame');

  function showLoading() {
    loadingEl.style.display = 'flex';
    errorEl.style.display   = 'none';
    frameEl.style.display   = 'none';
  }

  function showError() {
    loadingEl.style.display = 'none';
    errorEl.style.display   = 'flex';
    frameEl.style.display   = 'none';
  }

  function showFrame() {
    loadingEl.style.display = 'none';
    errorEl.style.display   = 'none';
    frameEl.style.display   = 'block';
  }

  async function init() {
    showLoading();
    try {
      const res = await fetch(SOURCE_URL + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('Gagal fetch ios_url.txt');

      const url = (await res.text()).trim();
      if (!url || !/^https?:\/\//i.test(url)) throw new Error('URL tidak valid');

      frameEl.onload = showFrame;
      frameEl.src    = url;

      setTimeout(() => {
        if (loadingEl.style.display !== 'none') showFrame();
      }, 4000);

    } catch (e) {
      showError();
    }
  }

  init();
</script>

</body>
</html>
